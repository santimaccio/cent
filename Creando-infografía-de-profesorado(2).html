<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#fff}svg{max-width:100%;height:auto}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1400" width="800" height="1400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;display=swap');
    .font { font-family: 'Montserrat', Arial, sans-serif; }
    .h1 { font-size: 32px; font-weight: 700; fill: #FFFFFF; }
    .h2 { font-size: 22px; font-weight: 700; fill: #003366; }
    .h3 { font-size: 18px; font-weight: 600; fill: #003366; }
    .h4 { font-size: 16px; font-weight: 600; fill: #003366; }
    .text { font-size: 14px; font-weight: 400; fill: #003366; line-height: 1.4; }
    .text-white { font-size: 14px; font-weight: 400; fill: #FFFFFF; }
    .text-small { font-size: 12px; font-weight: 400; fill: #003366; }
    .badge { font-size: 12px; font-weight: 600; fill: #FFFFFF; letter-spacing: 0.5px; }
    .cta { font-size: 20px; font-weight: 700; fill: #FFFFFF; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="1400" fill="#FFFFFF"/>
  
  <!-- 1) ENCABEZADO CON PROPUESTA DE VALOR -->
  <rect x="0" y="0" width="800" height="220" fill="#003366"/>
  <rect x="0" y="210" width="800" height="10" fill="#F4B400"/>
  
  <text x="400" y="45" class="font badge" text-anchor="middle">CENT N°1</text>
  <text x="400" y="85" class="font h1" text-anchor="middle">PROFESORADO DE EDUCACIÓN</text>
  <text x="400" y="120" class="font h1" text-anchor="middle">SECUNDARIA EN ECONOMÍA</text>
  <rect x="250" y="135" width="300" height="2" fill="#F4B400"/>
  <text x="400" y="165" class="font text-white" text-anchor="middle">Formamos profesionales que transforman el aula en un espacio</text>
  <text x="400" y="185" class="font text-white" text-anchor="middle">de pensamiento crítico, ciudadanía y desarrollo económico.</text>
  <text x="400" y="205" class="font text-white" text-anchor="middle" font-style="italic">Tu vocación, con herramientas para el mundo real.</text>
  
  <!-- 2) LOS 3 PILARES FORMATIVOS -->
  <text x="400" y="270" class="font h2" text-anchor="middle">LOS 3 PILARES FORMATIVOS</text>
  <rect x="320" y="280" width="160" height="3" fill="#F4B400"/>
  
  <g transform="translate(40, 310)">
    <!-- Pilar 1 -->
    <rect x="0" y="0" width="230" height="260" rx="8" fill="#FFFFFF" stroke="#003366" stroke-width="2"/>
    <circle cx="115" cy="45" r="25" fill="#F4B400"/>
    <!-- Icono: Libro -->
    <g fill="none" stroke="#003366" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M105 35 L105 58 L115 53 L125 58 L125 35"/>
      <path d="M108 40 L113 40"/>
      <path d="M108 45 L122 45"/>
    </g>
    <text x="115" y="90" class="font h4" text-anchor="middle">SABER DISCIPLINAR</text>
    <rect x="85" y="98" width="60" height="2" fill="#F4B400"/>
    <text x="115" y="120" class="font text-small" text-anchor="middle">Dominio de Microeconomía,</text>
    <text x="115" y="135" class="font text-small" text-anchor="middle">Macroeconomía, Finanzas</text>
    <text x="115" y="150" class="font text-small" text-anchor="middle">y Sistemas Económicos.</text>
    <text x="115" y="170" class="font text-small" text-anchor="middle">Análisis de coyuntura</text>
    <text x="115" y="185" class="font text-small" text-anchor="middle">nacional e internacional</text>
    <text x="115" y="200" class="font text-small" text-anchor="middle">con rigor académico.</text>
  </g>
  
  <g transform="translate(285, 310)">
    <!-- Pilar 2 -->
    <rect x="0" y="0" width="230" height="260" rx="8" fill="#FFFFFF" stroke="#003366" stroke-width="2"/>
    <circle cx="115" cy="45" r="25" fill="#F4B400"/>
    <!-- Icono: Pizarra -->
    <g fill="none" stroke="#003366" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="102" y="37" width="26" height="18" rx="1"/>
      <path d="M107 42 L123 42 M107 47 L120 47 M107 52 L115 52"/>
      <line x1="115" y1="55" x2="115" y2="60"/>
    </g>
    <text x="115" y="90" class="font h4" text-anchor="middle">SABER PEDAGÓGICO</text>
    <rect x="85" y="98" width="60" height="2" fill="#F4B400"/>
    <text x="115" y="120" class="font text-small" text-anchor="middle">Didáctica específica para</text>
    <text x="115" y="135" class="font text-small" text-anchor="middle">la enseñanza de Economía.</text>
    <text x="115" y="155" class="font text-small" text-anchor="middle">Estrategias innovadoras,</text>
    <text x="115" y="170" class="font text-small" text-anchor="middle">evaluación formativa y</text>
    <text x="115" y="185" class="font text-small" text-anchor="middle">uso de TIC en el aula.</text>
  </g>
  
  <g transform="translate(530, 310)">
    <!-- Pilar 3 -->
    <rect x="0" y="0" width="230" height="260" rx="8" fill="#FFFFFF" stroke="#003366" stroke-width="2"/>
    <circle cx="115" cy="45" r="25" fill="#F4B400"/>
    <!-- Icono: Grupo -->
    <g fill="#003366" stroke="none">
      <circle cx="109" cy="38" r="4"/>
      <circle cx="121" cy="38" r="4"/>
      <path d="M104 45 C104 42, 114 42, 114 45 L114 52 C114 54, 104 54, 104 52 Z"/>
      <path d="M116 45 C116 42, 126 42, 126 45 L126 52 C126 54, 116 54, 116 52 Z"/>
      <circle cx="115" cy="55" r="4"/>
      <path d="M110 62 C110 59, 120 59, 120 62 L120 62"/>
    </g>
    <text x="115" y="90" class="font h4" text-anchor="middle">PRÁCTICA CONTEXTUAL</text>
    <rect x="85" y="98" width="60" height="2" fill="#F4B400"/>
    <text x="115" y="120" class="font text-small" text-anchor="middle">Prácticas profesionales</text>
    <text x="115" y="135" class="font text-small" text-anchor="middle">desde 1º año en escuelas</text>
    <text x="115" y="150" class="font text-small" text-anchor="middle">asociadas. Vinculación</text>
    <text x="115" y="170" class="font text-small" text-anchor="middle">con la realidad socio-</text>
    <text x="115" y="185" class="font text-small" text-anchor="middle">productiva de la región.</text>
  </g>
  
  <!-- 3) PERFIL DE COMPETENCIAS -->
  <rect x="0" y="600" width="800" height="380" fill="#F8F9FA"/>
  <text x="400" y="635" class="font h2" text-anchor="middle">PERFIL DE COMPETENCIAS DEL EGRESADO</text>
  <rect x="280" y="645" width="240" height="3" fill="#F4B400"/>
  
  <!-- Columna Gestión de Aula -->
  <g transform="translate(40, 670)">
    <rect x="0" y="0" width="340" height="280" rx="8" fill="#FFFFFF" stroke="#003366" stroke-width="1.5"/>
    <rect x="0" y="0" width="340" height="45" rx="8" fill="#003366"/>
    <text x="170" y="28" class="font h3" text-anchor="middle" fill="#FFFFFF">GESTIÓN DE AULA</text>
    <g transform="translate(20, 65)">
      <circle cx="8" cy="8" r="4" fill="#F4B400"/>
      <text x="20" y="13" class="font text">Diseña secuencias didácticas basadas</text>
      <text x="20" y="30" class="font text">en problemas económicos reales.</text>
      
      <circle cx="8" cy="52" r="4" fill="#F4B400"/>
      <text x="20" y="57" class="font text">Promueve el debate y el pensamiento</text>
      <text x="20" y="74" class="font text">crítico sobre decisiones económicas.</text>
      
      <circle cx="8" cy="96" r="4" fill="#F4B400"/>
      <text x="20" y="101" class="font text">Utiliza casos, simulaciones y juegos</text>
      <text x="20" y="118" class="font text">de rol para enseñar conceptos.</text>
      
      <circle cx="8" cy="140" r="4" fill="#F4B400"/>
      <text x="20" y="145" class="font text">Atiende a la diversidad y trayectorias</text>
      <text x="20" y="162" class="font text">educativas en contextos diversos.</text>
      
      <circle cx="8" cy="184" r="4" fill="#F4B400"/>
      <text x="20" y="189" class="font text">Evalúa con instrumentos auténticos:</text>
      <text x="20" y="206" class="font text">proyectos, portfolios, producciones.</text>
    </g>
  </g>
  
  <!-- Columna Planificación Curricular -->
  <g transform="translate(420, 670)">
    <rect x="0" y="0" width="340" height="280" rx="8" fill="#FFFFFF" stroke="#003366" stroke-width="1.5"/>
    <rect x="0" y="0" width="340" height="45" rx="8" fill="#003366"/>
    <text x="170" y="28" class="font h3" text-anchor="middle" fill="#FFFFFF">PLANIFICACIÓN CURRICULAR</text>
    <g transform="translate(20, 65)">
      <circle cx="8" cy="8" r="4" fill="#F4B400"/>
      <text x="20" y="13" class="font text">Planifica por competencias y</text>
      <text x="20" y="30" class="font text">capacidades según el diseño curricular.</text>
      
      <circle cx="8" cy="52" r="4" fill="#F4B400"/>
      <text x="20" y="57" class="font text">Articula contenidos con problemáticas</text>
      <text x="20" y="74" class="font text">sociales y económicas actuales.</text>
      
      <circle cx="8" cy="96" r="4" fill="#F4B400"/>
      <text x="20" y="101" class="font text">Integra Educación Financiera y</text>
      <text x="20" y="118" class="font text">Educación Tributaria en la enseñanza.</text>
      
      <circle cx="8" cy="140" r="4" fill="#F4B400"/>
      <text x="20" y="145" class="font text">Desarrolla proyectos interdisciplinarios</text>
      <text x="20" y="162" class="font text">con otras áreas del conocimiento.</text>
      
      <circle cx="8" cy="184" r="4" fill="#F4B400"/>
      <text x="20" y="189" class="font text">Trabaja en equipo en la planificación</text>
      <text x="20" y="206" class="font text">institucional y departamental.</text>
    </g>
  </g>
  
  <!-- 4) SELLO DE LA ESPECIALIDAD -->
  <text x="400" y="1025" class="font h2" text-anchor="middle">SELLO DE LA ESPECIALIDAD CENT N°1</text>
  <rect x="260" y="1035" width="280" height="3" fill="#F4B400"/>
  <text x="400" y="1060" class="font text" text-anchor="middle">Nuestra marca distintiva: 5 capacidades clave que potenciamos</text>
  
  <g transform="translate(40, 1085)">
    <!-- Capacidad 1 -->
    <g>
      <rect x="0" y="0" width="140" height="140" rx="8" fill="#FFFFFF" stroke="#F4B400" stroke-width="2"/>
      <circle cx="70" cy="35" r="18" fill="#003366"/>
      <text x="70" y="42" class="font h3" text-anchor="middle" fill="#FFFFFF">1</text>
      <text x="70" y="70" class="font text" text-anchor="middle" font-weight="600">Lectura crítica</text>
      <text x="70" y="85" class="font text-small" text-anchor="middle">de la realidad</text>
      <text x="70" y="100" class="font text-small" text-anchor="middle">socioeconómica</text>
      <text x="70" y="115" class="font text-small" text-anchor="middle">local y global</text>
    </g>
    
    <!-- Capacidad 2 -->
    <g transform="translate(152, 0)">
      <rect x="0" y="0" width="140" height="140" rx="8" fill="#FFFFFF" stroke="#F4B400" stroke-width="2"/>
      <circle cx="70" cy="35" r="18" fill="#003366"/>
      <text x="70" y="42" class="font h3" text-anchor="middle" fill="#FFFFFF">2</text>
      <text x="70" y="70" class="font text" text-anchor="middle" font-weight="600">Alfabetización</text>
      <text x="70" y="85" class="font text-small" text-anchor="middle">económica y</text>
      <text x="70" y="100" class="font text-small" text-anchor="middle">financiera para</text>
      <text x="70" y="115" class="font text-small" text-anchor="middle">la ciudadanía</text>
    </g>
    
    <!-- Capacidad 3 -->
    <g transform="translate(304, 0)">
      <rect x="0" y="0" width="140" height="140" rx="8" fill="#FFFFFF" stroke="#F4B400" stroke-width="2"/>
      <circle cx="70" cy="35" r="18" fill="#003366"/>
      <text x="70" y="42" class="font h3" text-anchor="middle" fill="#FFFFFF">3</text>
      <text x="70" y="70" class="font text" text-anchor="middle" font-weight="600">Diseño de</text>
      <text x="70" y="85" class="font text-small" text-anchor="middle">experiencias</text>
      <text x="70" y="100" class="font text-small" text-anchor="middle">de aprendizaje</text>
      <text x="70" y="115" class="font text-small" text-anchor="middle">significativas</text>
    </g>
    
    <!-- Capacidad 4 -->
    <g transform="translate(456, 0)">
      <rect x="0" y="0" width="140" height="140" rx="8" fill="#FFFFFF" stroke="#F4B400" stroke-width="2"/>
      <circle cx="70" cy="35" r="18" fill="#003366"/>
      <text x="70" y="42" class="font h3" text-anchor="middle" fill="#FFFFFF">4</text>
      <text x="70" y="70" class="font text" text-anchor="middle" font-weight="600">Investigación</text>
      <text x="70" y="85" class="font text-small" text-anchor="middle">educativa sobre</text>
      <text x="70" y="100" class="font text-small" text-anchor="middle">la enseñanza</text>
      <text x="70" y="115" class="font text-small" text-anchor="middle">de Economía</text>
    </g>
    
    <!-- Capacidad 5 -->
    <g transform="translate(608, 0)">
      <rect x="0" y="0" width="112" height="140" rx="8" fill="#FFFFFF" stroke="#F4B400" stroke-width="2"/>
      <circle cx="56" cy="35" r="18" fill="#003366"/>
      <text x="56" y="42" class="font h3" text-anchor="middle" fill="#FFFFFF">5</text>
      <text x="56" y="70" class="font text" text-anchor="middle" font-weight="600">Compromiso</text>
      <text x="56" y="85" class="font text-small" text-anchor="middle">ético con la</text>
      <text x="56" y="100" class="font text-small" text-anchor="middle">formación de</text>
      <text x="56" y="115" class="font text-small" text-anchor="middle">ciudadanos</text>
    </g>
  </g>
  
  <!-- CTA -->
  <rect x="0" y="1260" width="800" height="140" fill="#003366"/>
  <rect x="0" y="1260" width="800" height="8" fill="#F4B400"/>
  <text x="400" y="1305" class="font h1" text-anchor="middle">FORMÁ PARTE DEL CAMBIO</text>
  <rect x="250" y="1320" width="300" height="45" rx="22" fill="#F4B400"/>
  <text x="400" y="1349" class="font cta" text-anchor="middle" fill="#003366">INSCRIBITE HOY EN CENT N° 1</text>
  <text x="400" y="1380" class="font text-small" text-anchor="middle" fill="#FFFFFF">Título con validez nacional | 4 años de duración | Prácticas desde 1º año</text>
</svg>
</body>
</html>
